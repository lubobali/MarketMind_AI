name: MarketMind AI Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python and dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip > /dev/null 2>&1
          pip install --break-system-packages -r requirements.txt > /dev/null 2>&1
          python3 --version
          ruff --version

      - name: Ruff lint
        run: ruff check config/ utils/ notebooks/ tests/

      - name: Ruff format check
        run: ruff format --check config/ utils/ notebooks/ tests/

      - name: Run unit tests
        run: python3 -m pytest tests/unit/ -q --tb=short

      - name: Run integration tests
        run: python3 -m pytest tests/integration/ -q -m integration || true
        continue-on-error: true
